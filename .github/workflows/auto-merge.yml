name: auto-merge

on:
  workflow_run:
    workflows: [validate]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: auto-merge claude/* PRs on green CI
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Find matching PR and squash-merge
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const { owner, repo } = context.repo;

            // Only act on Routine-authored branches.
            if (!branch.startsWith('claude/')) {
              core.info(`Branch ${branch} is not a claude/* branch; skipping.`);
              return;
            }

            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: 'open',
              head: `${owner}:${branch}`,
            });

            if (prs.length === 0) {
              core.info(`No open PR for ${branch}`);
              return;
            }

            for (const pr of prs) {
              core.info(`Merging PR #${pr.number} (${pr.title})`);
              await github.rest.pulls.merge({
                owner, repo,
                pull_number: pr.number,
                merge_method: 'squash',
                commit_title: pr.title,
              });
              core.info(`Merged PR #${pr.number}`);
            }
